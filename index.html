<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Slot Winner Machine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body {
    background-image: url("background.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
}

#machine {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 60px 0;
}

#sparkle-canvas { position: absolute; inset: 0; z-index: 30; pointer-events: none; }

/* HEADER SECTION */
#header-area {
    text-align: center;
    z-index: 10;
}

#event-title-text { 
    font-size: 42px; 
    font-weight: 900; 
    color: #FFFFFF; 
    letter-spacing: 4px; 
    text-transform: uppercase;
    text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 20px #8800ff;
    margin-bottom: 20px;
}

#winner-header {
    font-size: 32px;
    color: #00ff66;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(0,255,102,0.6);
    opacity: 0;
    transition: opacity 0.5s;
}
#winner-header.show { opacity: 1; }

/* CENTRAL REEL AREA */
#reel-frame { 
    width: 100%; 
    position: relative; 
    overflow: hidden; 
}

#reel-window { height: 220px; overflow: hidden; position: relative; }

.reel-item {
    height: 220px;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 58px; 
    font-weight: 900;
    text-transform: uppercase;
    color: #FFFFFF !important; 
    text-align: center;
    padding: 0 300px; 
    flex-shrink: 0;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
}

/* ARROWS & BLINKING */
#arrow-left, #arrow-right { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    z-index: 25; 
    pointer-events: none; 
}
#arrow-left { left: 5%; }
#arrow-right { right: 5%; }

.arrow-tri-right { width: 0; height: 0; border-top: 45px solid transparent; border-bottom: 45px solid transparent; border-left: 55px solid #fff; filter: drop-shadow(0 0 15px #8800ff); }
.arrow-tri-left { width: 0; height: 0; border-top: 45px solid transparent; border-bottom: 45px solid transparent; border-right: 55px solid #fff; filter: drop-shadow(0 0 15px #8800ff); }

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.1; }
    100% { opacity: 1; }
}
.blinking { animation: blink 0.3s infinite; }

/* SPIN BUTTON */
#spin-btn { 
    background: linear-gradient(180deg,#aa00ff,#7700cc); 
    border: 4px solid #fff; 
    border-radius: 50%; 
    width: 140px; 
    height: 140px; 
    color: #fff; 
    font-size: 26px; 
    font-weight: 900; 
    cursor: pointer; 
    box-shadow: 0 0 40px rgba(170, 0, 255, 0.8);
    transition: transform 0.2s;
    z-index: 40;
}
#spin-btn:active:not(:disabled) { transform: scale(0.9); }
#spin-btn:disabled { opacity: 0.5; cursor: default; }

</style>
</head>
<body>

<div id="machine">
  <canvas id="sparkle-canvas"></canvas>
  
  <div id="header-area">
    <div id="event-title-text">MEF SECRETARY CONFERENCE 2026 LUCKY DRAW</div>
    <div id="winner-header">WINNER</div>
  </div>

  <div id="reel-frame">
    <div id="reel-window"><div id="reel"></div></div>
    <div id="arrow-left"><div class="arrow-tri-right"></div></div>
    <div id="arrow-right"><div class="arrow-tri-left"></div></div>
  </div>

  <button id="spin-btn">SPIN</button>
</div>

<script>
const spCanvas = document.getElementById('sparkle-canvas');
const spCtx = spCanvas.getContext('2d');
const reelEl = document.getElementById('reel');
const spinBtn = document.getElementById('spin-btn');
const winHeader = document.getElementById('winner-header');
const arrows = [document.getElementById('arrow-left'), document.getElementById('arrow-right')];

function resizeSp() {
  spCanvas.width = window.innerWidth;
  spCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeSp);
resizeSp();

let sparkles = [];
function spawnWinSparkle(cx, cy, color) {
  for (let i = 0; i < 15; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 4 + Math.random() * 8;
    sparkles.push({
      x: cx, y: cy,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 2,
      life: 1, size: Math.random() * 6 + 2, color
    });
  }
}

function drawSparkles() {
  spCtx.clearRect(0, 0, spCanvas.width, spCanvas.height);
  sparkles.forEach((s, i) => {
    s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.life -= 0.015;
    if (s.life <= 0) { sparkles.splice(i, 1); return; }
    spCtx.globalAlpha = s.life;
    spCtx.fillStyle = s.color;
    spCtx.beginPath();
    spCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    spCtx.fill();
  });
  requestAnimationFrame(drawSparkles);
}
drawSparkles();

const names = ['LIM KAR YERN', 'MUHAMMAD SYAZWAN BIN MOHD NAZRI', 'ANISAH BINTI ABDULLAH', 'DIAN FHARHANA BINTI MAT HUSIN', 'INTAN AMIRAH NABILAH BINTI BAHARIN', 'KHO YEAP LIAN', 'NUR AQILAH BINTI JUZAILAN', 'SHALINI JAYAKUMAR', 'WAN KHAIRULNISA BINTI MOHD NOOR', 'HASLINA BINTI ABDUL MAJID', 'NORAINI BINTI JAAFAR', 'NURUL HAZNI BINTI JALALUDDIN', 'NURUL NADIA BINTI SHAMSUDDIN', 'ROSMAH BINTI RAHIM', 'YAT PUI HONG', 'LIEW MEI SHIAU', 'ASARIAH BT AHMAD', 'CHEMPAWAN BINTI ISMAIL', 'NORAIN BINTI ABDUL MANAN', 'NORHASIMAH BINTI DAUD', 'NORKHUZIAMAH BINTI AHMAD BASRI', 'RAIHANAH BT MOHD KAMAL', 'SITI SUHAILA BINTI OTHMAN', 'SUZANA BINTI SABRAN', 'MUTIA SABIHA BINTI ALIAS', 'NURUL NADIA BINTI MOHAMAD HAZLI', 'SALMI BINTI AHMAD @ JONO', 'SYUSILAWATI BINTI SYOFIANIS', 'YUSNIZA BINTI MOHAMED YUSOF', 'NURFIHDDAH BINTI ZOLKARNAIN', 'MOHD NIZAM BIN HARUN', 'NORFAZILAH BINTI MOHAMED YUSOF', 'NUR AINIAH BINTI CHE RASHID', 'ROHAYA BINTI YAHYA', 'SOH EE LIN', 'CHOONG HUI YAN', 'CHOW KAI XIN', 'FOO SOH YEE', 'GOH JUN YI', 'NORAFRA AZIRA BINTI ADNAN', 'SARAHFADHILAH BINTI OMAR', 'ADLEEN LAILY BINTI MUSTAPHA', 'NOORSHARINA BINTI ASMUDI', 'SITI FARIDAH BINTI ABDUL MANAP', 'YASMIN BINTI ZEKER HUSSEIN', 'HAZIMAH HANIS BINTI AZIZI', 'LEE FOONG KUAN', 'NURUL ANIZA BINTI ZAHARI', 'EMY FAIZURA BINTI AZNAN', 'SHARIFAH FADILAH BINTI SYED FAISAL', 'NAZATUL SHIMA BINTI MOHD RAUB', 'NORSHARIFAHANA BINTI UMAR', 'SALAMAH BINTI AZAHARI', 'ZULAIKHA NAZIHAH BINTI SHAHRUDDIN', 'SITI HAJAR BINTI ABDULLAH', 'RAWANAMMAH A/P SEEMACHALAM (SHEILA)', 'AYZA HAZWANI BINTI ARIFUDDIN', 'NOR HERDAWATI BINTI ABD SALIM', 'NUR ZAFNIE BINTI MOHD ZAKRI', 'NURATHIRAH BINTI AMINUDDIN', 'NURHAYATI BINTI MAT SARIP', 'NURUL EDAYU BINTI NOR HASHIM', 'ROZILAWATI BINTI MOHD ROSLI', 'JOCELYN DOWSE', 'JUNAINAH BINTI JAMALUDIN', 'NADIYAH BINTI ADNAN', 'NOOR MARDHIAH BINTI ABDULLAH', 'NOORFATIN BINTI YAHAYA ARIS', 'NOR HUSNA BINTI HAYON', 'NUR FARAH BINTI MOHAMAD AZLAN', 'NURARIEFAH BINTI MOHD RADZUAN', 'ZARINA BINTI MOHD NASIRAN', 'NOOR ZAHRIYAH BINTI ZAHIR ABAS', 'BALQIS BINTI BAHWI', 'NOORZAILI BT MOHAMAD', 'NOR RASHIDA BINTI MOHD ARIS', 'NORA BINTI MOHD YASIN', 'NORAFAIZAH BINTI YEOP ABDULLAH', 'NORHANA BINTI MISRO', 'SYARIFAH NOORAZLIN BT SYED RAMZAN', 'TENGKU NADIAH HANIS BINTI T ABD NAWAWI', 'WONG MUN WAH', 'MOHAMAD ABIS HO BIN MOHAMMAD KAMAL HO', 'NURUL DIAYANAH ROSLI', 'SITI KHADIJAH BINTI MUSTAFFA', 'SURIA BINTI ABDUL MALEK', 'ZAHIFA FHAZUKHA BINTI ZAINAL ABIDIN', 'NUR AMRINA BINTI ABD RAZAK', 'RAIHANAH BINTI AMAT JELAINI', 'ROHANA BT MOHAMED', 'ANITA BINTI ZAINAL ABIDIN', 'MASHITA SEHA BINTI SAIM', 'NG LAY KOON', 'NOR JANA BINTI JANTAN', 'SHARIFAH AZLINDA BT SAYED YASIN', 'SUZANA BINTI A.LATIF', 'NOR ZALILA BINTI MOHAMED NOR', 'NURUL HAIREENA BINTI ISNIN', 'NURUL HAYATI BINTI AZMI', 'SITI NURUL NADIA BINTI ANUAR', 'DATO WAN KAMARUZAMAN BIN WAN AHMAD', 'NORPADIZAH BINTI PADZIL', 'NUR AZLIN BINTI ABU TALIB', 'LIANG CHI WAI', 'SHAZLIN MD KASIM', 'CHEW HUEI LING', 'LEE CHEE YIN', 'MUHAMMAD HAIQAH B MUSTAFAH', 'FAZILAH BINTI GHAZALI', 'HASNIEDA BINTI HASBULLAH', 'WAN NURUL SYAKINAH BINTI ROSLI', 'LILY FAZLEENA BT MOHAMED', 'NURUL AIN BINTI ABIDIN', 'CALLY LOO KAR LAI', 'DOROTHY A/P C PAKIAM @ PAKIANATHAN', 'HIU CHOI FOONG', 'KHAN YUET YEAN DAISY', 'ROXZANA CHONG LEN YIN', 'SITI NURHIDAYAH BINTI IBRAHIM', 'CATHERINE FANG HUI KIAN', 'EDEN JUIN IBIS', 'AIMAN BIN DAZUKI', 'INTAN BINTI AZMI', 'KAMARUDDIN BIN SU', 'ROZAN BINTI MOHAMED', 'TEOH GUAT THOE', 'JESSIE KONG', 'AZLINDA BINTI ATAN', 'JOEY CHONG YOKE LIAN', 'JOYCE LEE SOO MING', 'NOORAISHAH BINTI AZAHAR', 'ZOE CHEW HUI TENG', 'NURSARIYATI BINTI MOHAMED', 'JACQUELINE ANAK GEOFFERY AGOD', 'TIARA WAN SYAHIDAH BINTI ABDULLAH'];

let spinning = false;

function buildReel(targetName) {
  reelEl.innerHTML = '';
  const pool = [...names];
  const extended = [];
  // Build a long reel for a longer spin
  while (extended.length < 60) {
    extended.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  extended.forEach(n => {
    const div = document.createElement('div');
    div.className = 'reel-item';
    div.textContent = n;
    reelEl.appendChild(div);
  });
  const finalDiv = document.createElement('div');
  finalDiv.className = 'reel-item';
  finalDiv.textContent = targetName;
  reelEl.appendChild(finalDiv);
  return { totalItems: extended.length };
}

function spin() {
  if (spinning) return;
  spinning = true;
  
  // Start anticipation effects
  spinBtn.disabled = true;
  winHeader.classList.remove('show');
  arrows.forEach(a => a.classList.add('blinking'));

  const target = names[Math.floor(Math.random() * names.length)];
  const { totalItems } = buildReel(target);
  
  const ITEM_H = 220;
  const totalScroll = totalItems * ITEM_H;
  const duration = 8000; // 8 seconds spin
  const start = performance.now();

  function anim(now) {
    const t = Math.min((now - start) / duration, 1);
    // Custom cubic-bezier like ease for "slowing down slowly"
    const ease = 1 - Math.pow(1 - t, 5); 
    reelEl.style.transform = `translateY(-${ease * totalScroll}px)`;
    
    if (t < 1) requestAnimationFrame(anim);
    else onWin(target);
  }
  requestAnimationFrame(anim);
}

function onWin(name) {
  spinning = false;
  spinBtn.disabled = false;
  winHeader.classList.add('show');
  arrows.forEach(a => a.classList.remove('blinking'));

  // Highlight effects
  spawnWinSparkle(window.innerWidth/2, window.innerHeight/2, '#ffffff');
  spawnWinSparkle(window.innerWidth/2, window.innerHeight/2, '#00ff66');
}

// Initial setup
reelEl.innerHTML = '<div class="reel-item">READY?</div>';
spinBtn.addEventListener('click', spin);
</script>
</body>
</html>
