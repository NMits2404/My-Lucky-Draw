<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futuristic Lucky Draw</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body {
    background-image: url("background.jpeg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial Black', sans-serif;
}

#machine {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 40px;
    background: rgba(0, 0, 0, 0.1);
}

#sparkle-canvas { position: absolute; inset: 0; z-index: 30; pointer-events: none; }

/* TOP BAR */
#top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
}

#winner-log {
    width: 320px;
    height: 180px;
    background: rgba(20, 0, 40, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid #8800ff;
    padding: 15px;
    overflow-y: auto;
    color: #fff;
    box-shadow: 0 0 15px rgba(136, 0, 255, 0.3);
}
#winner-log h3 { 
    font-size: 14px; 
    color: #00ff66; 
    margin-bottom: 10px; 
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 255, 102, 0.3);
}
.log-entry { 
    font-size: 13px; 
    margin-top: 5px;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.05);
    border-left: 2px solid #00ff66; 
}

/* HEADER */
#header-area { text-align: right; }
#event-title-text { 
    font-size: 38px; 
    color: #FFFFFF; 
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(136, 0, 255, 1);
}
#lucky-draw-sub { font-size: 32px; color: #fff; display: block; letter-spacing: 4px; }
#winner-header {
    font-size: 45px;
    color: #00ff66;
    text-transform: uppercase;
    text-shadow: 0 0 20px #00ff66;
    opacity: 0;
    transition: opacity 0.3s;
}
#winner-header.show { opacity: 1; }

/* THE REEL */
#reel-frame { width: 100%; position: relative; overflow: hidden; }
#reel-window { height: 220px; overflow: hidden; position: relative; }

.reel-item {
    height: 220px;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px; 
    font-weight: 900;
    text-transform: uppercase;
    color: #FFFFFF !important; 
    text-align: center;
    padding: 0 300px; 
    flex-shrink: 0;
    text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.5);
}

/* NEW GLOW ANIMATION */
.winner-glow {
    animation: winnerPulse 1s infinite alternate;
}

@keyframes winnerPulse {
    from {
        text-shadow: 0 0 10px #fff, 0 0 20px #000000, 0 0 20px #000000, 0 0 20px #000000;
        transform: scale(1);
    }
    to {
        text-shadow: 0 0 20px #000000, 0 0 20px #000000, 0 0 20px #CBC3E3, 0 0 20px #CBC3E3;
        transform: scale(1.1);
    }
}

/* ARROWS */
#arrow-left, #arrow-right { position: absolute; top: 50%; transform: translateY(-50%); z-index: 25; }
#arrow-left { left: 5%; }
#arrow-right { right: 5%; }
.arrow-tri-right { width: 0; height: 0; border-top: 40px solid transparent; border-bottom: 40px solid transparent; border-left: 50px solid #fff; filter: drop-shadow(0 0 10px #8800ff); }
.arrow-tri-left { width: 0; height: 0; border-top: 40px solid transparent; border-bottom: 40px solid transparent; border-right: 50px solid #fff; filter: drop-shadow(0 0 10px #8800ff); }

/* BUTTONS */
#controls { display: flex; gap: 20px; z-index: 40; }
.futuristic-btn {
    background: rgba(0, 0, 0, 0.7);
    border: 2px solid;
    color: #fff;
    padding: 15px 40px;
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
}
#spin-btn { border-color: #00ff66; box-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
#spin-btn:hover { background: #00ff66; color: #000; box-shadow: 0 0 30px #00ff66; }
#reset-btn { border-color: #ff4444; font-size: 14px; }
#reset-btn:hover { background: #ff4444; box-shadow: 0 0 20px #ff4444; }

button:disabled { opacity: 0.2; cursor: default; }
.blinking { animation: blink 0.3s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div id="machine">
  <canvas id="sparkle-canvas"></canvas>
  
  <div id="top-bar">
    <div id="winner-log">
        <h3>WINNER ARCHIVE</h3>
        <div id="log-content"></div>
    </div>
    <div id="header-area">
      <div id="event-title-text">MEF SECRETARY CONFERENCE 2026</div>
      <span id="lucky-draw-sub">LUCKY DRAW</span>
      <div id="winner-header">WINNER</div>
    </div>
  </div>

  <div id="reel-frame">
    <div id="reel-window"><div id="reel"></div></div>
    <div id="arrow-left"><div class="arrow-tri-right"></div></div>
    <div id="arrow-right"><div class="arrow-tri-left"></div></div>
  </div>

  <div id="controls">
    <button id="reset-btn" class="futuristic-btn">SYSTEM RESET</button>
    <button id="spin-btn" class="futuristic-btn">SPIN</button>
  </div>
</div>

<script>
const reelEl = document.getElementById('reel');
const spinBtn = document.getElementById('spin-btn');
const resetBtn = document.getElementById('reset-btn');
const winHeader = document.getElementById('winner-header');
const logContent = document.getElementById('log-content');
const arrows = [document.getElementById('arrow-left'), document.getElementById('arrow-right')];

const names = ['LIM KAR YERN', 'MUHAMMAD SYAZWAN BIN MOHD NAZRI', 'ANISAH BINTI ABDULLAH', 'DIAN FHARHANA BINTI MAT HUSIN', 'INTAN AMIRAH NABILAH BINTI BAHARIN', 'KHO YEAP LIAN', 'NUR AQILAH BINTI JUZAILAN', 'SHALINI JAYAKUMAR', 'WAN KHAIRULNISA BINTI MOHD NOOR', 'HASLINA BINTI ABDUL MAJID', 'NORAINI BINTI JAAFAR', 'NURUL HAZNI BINTI JALALUDDIN', 'NURUL NADIA BINTI SHAMSUDDIN', 'ROSMAH BINTI RAHIM', 'YAT PUI HONG', 'LIEW MEI SHIAU', 'ASARIAH BT AHMAD', 'CHEMPAWAN BINTI ISMAIL', 'NORAIN BINTI ABDUL MANAN', 'NORHASIMAH BINTI DAUD', 'NORKHUZIAMAH BINTI AHMAD BASRI', 'RAIHANAH BT MOHD KAMAL', 'SITI SUHAILA BINTI OTHMAN', 'SUZANA BINTI SABRAN', 'MUTIA SABIHA BINTI ALIAS', 'NURUL NADIA BINTI MOHAMAD HAZLI', 'SALMI BINTI AHMAD @ JONO', 'SYUSILAWATI BINTI SYOFIANIS', 'YUSNIZA BINTI MOHAMED YUSOF', 'NURFIHDDAH BINTI ZOLKARNAIN', 'MOHD NIZAM BIN HARUN', 'NORFAZILAH BINTI MOHAMED YUSOF', 'NUR AINIAH BINTI CHE RASHID', 'ROHAYA BINTI YAHYA', 'SOH EE LIN', 'CHOONG HUI YAN', 'CHOW KAI XIN', 'FOO SOH YEE', 'GOH JUN YI', 'NORAFRA AZIRA BINTI ADNAN', 'SARAHFADHILAH BINTI OMAR', 'ADLEEN LAILY BINTI MUSTAPHA', 'NOORSHARINA BINTI ASMUDI', 'SITI FARIDAH BINTI ABDUL MANAP', 'YASMIN BINTI ZEKER HUSSEIN', 'NORDIANA BT ZAKARIA', 'ROZIAH BINTI JANI', 'ROZITA BINTI MD ARIS', 'BADJIE XAEBCOURIEYIEAN BINTI IBADALLAH', 'NOR MASITAH BINTI AWANG', 'SYAZWANI BINTI RAMLI', 'LAI HEONG WONG', 'HAZIMAH HANIS BINTI AZIZI', 'LEE FOONG KUAN', 'NURUL ANIZA BINTI ZAHARI', 'EMY FAIZURA BINTI AZNAN', 'SHARIFAH FADILAH BINTI SYED FAISAL', 'NAZATUL SHIMA BINTI MOHD RAUB', 'NORSHARIFAHANA BINTI UMAR', 'SALAMAH BINTI AZAHARI', 'ZULAIKHA NAZIHAH BINTI SHAHRUDDIN', 'SITI HAJAR BINTI ABDULLAH', 'RAWANAMMAH A/P SEEMACHALAM (SHEILA)', 'AYZA HAZWANI BINTI ARIFUDDIN', 'NOR HERDAWATI BINTI ABD SALIM', 'NUR ZAFNIE BINTI MOHD ZAKRI', 'NURATHIRAH BINTI AMINUDDIN', 'NURHAYATI BINTI MAT SARIP', 'NURUL EDAYU BINTI NOR HASHIM', 'ROZILAWATI BINTI MOHD ROSLI', 'JOCELYN DOWSE', 'JUNAINAH BINTI JAMALUDIN', 'NADIYAH BINTI ADNAN', 'NOOR MARDHIAH BINTI ABDULLAH', 'NOORFATIN BINTI YAHAYA ARIS', 'NOR HUSNA BINTI HAYON', 'NUR FARAH BINTI MOHAMAD AZLAN', 'NURARIEFAH BINTI MOHD RADZUAN', 'ZARINA BINTI MOHD NASIRAN', 'NOOR ZAHRIYAH BINTI ZAHIR ABAS', 'BALQIS BINTI BAHWI', 'NOORZAILI BT MOHAMAD', 'NOR RASHIDA BINTI MOHD ARIS', 'NORA BINTI MOHD YASIN', 'NORAFAIZAH BINTI YEOP ABDULLAH', 'NORHANA BINTI MISRO', 'SYARIFAH NOORAZLIN BT SYED RAMZAN', 'TENGKU NADIAH HANIS BINTI T ABD NAWAWI', 'WONG MUN WAH', 'MOHAMAD ABIS HO BIN MOHAMMAD KAMAL HO', 'NURUL DIAYANAH ROSLI', 'SITI KHADIJAH BINTI MUSTAFFA', 'SURIA BINTI ABDUL MALEK', 'ZAHIFA FHAZUKHA BINTI ZAINAL ABIDIN', 'NUR AMRINA BINTI ABD RAZAK', 'RAIHANAH BINTI AMAT JELAINI', 'SHALIZA BINTI MOHAMED YA', 'JURAIDA BINTI AHMAD ARIFF', 'NOR WAHIDAH BTE MEOR MOHAMAD OMAR', 'ROHANA BT MOHAMED', 'ANITA BINTI ZAINAL ABIDIN', 'MASHITA SEHA BINTI SAIM', 'NG LAY KOON', "NOR'JANA BINTI JANTAN", 'SHARIFAH AZLINDA BT SAYED YASIN', 'SUZANA BINTI A.LATIF', 'NOR ZALILA BINTI MOHAMED NOR', 'NURUL HAIREENA BINTI ISNIN', 'NURUL HAYATI BINTI AZMI', 'SITI NURUL NADIA BINTI ANUAR', 'DATO WAN KAMARUZAMAN BIN WAN AHMAD', 'NORPADIZAH BINTI PADZIL', 'NUR AZLIN BINTI ABU TALIB', 'LIANG CHI WAI', 'KRISNAINI BINTI MOHD YUSOF', 'SAZLIN SHUHIZAM BINTI MOHD SHARIFF', 'SHAZLIN MD KASIM', 'DR SUSEELA YELUMALAI', 'CHEW HUEI LING', 'LEE CHEE YIN', 'MUHAMMAD HAIQAH B MUSTAFAH', 'FAZILAH BINTI GHAZALI', 'HASNIEDA BINTI HASBULLAH', 'WAN NURUL SYAKINAH BINTI ROSLI', 'LILY FAZLEENA BT MOHAMED', 'NURUL AIN BINTI ABIDIN', 'CALLY LOO KAR LAI', 'DOROTHY A/P C PAKIAM @ PAKIANATHAN', 'HIU CHOI FOONG', 'KHAN YUET YEAN DAISY', 'ROXZANA CHONG LEN YIN', 'SITI NURHIDAYAH BINTI IBRAHIM', 'CATHERINE FANG HUI KIAN', 'EDEN JUIN IBIS', 'AIMAN BIN DAZUKI', 'INTAN BINTI AZMI', 'KAMARUDDIN BIN SU', 'AMYLIA NATASHA BINTI HISHAMMUDDIN', 'NOR SYAFIQAH BINTI MOHD SAID', 'NURFADZILAH BINTI AHMAD FADZIL', 'WAN HALIMA AINI BINTI WAN AZAM', 'ROZAN BINTI MOHAMED', 'TEOH GUAT THOE', 'JESSIE KONG', 'AZLINDA BINTI ATAN', 'JOEY CHONG YOKE LIAN', 'JOYCE LEE SOO MING', 'NOORAISHAH BINTI AZAHAR', 'ZOE CHEW HUI TENG', 'NURSARIYATI BINTI MOHAMED', 'JACQUELINE ANAK GEOFFERY AGOD', 'TIARA WAN SYAHIDAH BINTI ABDULLAH'];

let activePool = [...names];
let spinning = false;

const spCanvas = document.getElementById('sparkle-canvas');
const spCtx = spCanvas.getContext('2d');
function resizeSp() { spCanvas.width = window.innerWidth; spCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeSp); resizeSp();
let sparkles = [];
function spawnWinSparkle(cx, cy, color) {
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 4 + Math.random() * 8;
    sparkles.push({ x: cx, y: cy, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 2, life: 1, size: Math.random() * 5 + 1, color });
  }
}
function drawSparkles() {
  spCtx.clearRect(0, 0, spCanvas.width, spCanvas.height);
  sparkles.forEach((s, i) => {
    s.x += s.vx; s.y += s.vy; s.vy += 0.15; s.life -= 0.01;
    if (s.life <= 0) { sparkles.splice(i, 1); return; }
    spCtx.globalAlpha = s.life; spCtx.fillStyle = s.color;
    spCtx.beginPath(); spCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2); spCtx.fill();
  });
  requestAnimationFrame(drawSparkles);
}
drawSparkles();

function buildReel(targetName) {
  reelEl.innerHTML = '';
  const pool = activePool.length > 0 ? activePool : ["End of List"];
  const extended = [];
  // Increased count to 70 for longer duration
  while (extended.length < 70) { extended.push(pool[Math.floor(Math.random() * pool.length)]); }
  extended.forEach(n => {
    const div = document.createElement('div');
    div.className = 'reel-item';
    div.textContent = n;
    reelEl.appendChild(div);
  });
  const finalDiv = document.createElement('div');
  finalDiv.className = 'reel-item';
  finalDiv.textContent = targetName;
  reelEl.appendChild(finalDiv);
  return { totalItems: extended.length };
}

function spin() {
  if (spinning || activePool.length === 0) return;
  spinning = true;
  spinBtn.disabled = true;
  resetBtn.disabled = true;
  winHeader.classList.remove('show');
  arrows.forEach(a => a.classList.add('blinking'));

  const winnerIndex = Math.floor(Math.random() * activePool.length);
  const target = activePool[winnerIndex];
  
  const { totalItems } = buildReel(target);
  const totalScroll = totalItems * 220;
  const start = performance.now();

  function anim(now) {
    // Increased duration to 12000 (12 seconds)
    const t = Math.min((now - start) / 12000, 1);
    const ease = 1 - Math.pow(1 - t, 4); 
    reelEl.style.transform = `translateY(-${ease * totalScroll}px)`;
    if (t < 1) requestAnimationFrame(anim);
    else onWin(target, winnerIndex);
  }
  requestAnimationFrame(anim);
}

function onWin(name, index) {
  spinning = false;
  spinBtn.disabled = false;
  resetBtn.disabled = false;
  winHeader.classList.add('show');
  arrows.forEach(a => a.classList.remove('blinking'));

  // ADD GLOW TO THE NAME IN THE REEL
  reelEl.lastElementChild.classList.add('winner-glow');

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = name;
  logContent.prepend(entry);

  activePool.splice(index, 1);
  spawnWinSparkle(window.innerWidth/2, window.innerHeight/2, '#00ff66');
}

function resetMachine() {
    activePool = [...names];
    logContent.innerHTML = '';
    winHeader.classList.remove('show');
    reelEl.style.transform = 'translateY(0)';
    reelEl.innerHTML = '<div class="reel-item">SYSTEM READY</div>';
}

reelEl.innerHTML = '<div class="reel-item">SYSTEM READY</div>';
spinBtn.addEventListener('click', spin);
resetBtn.addEventListener('click', resetMachine);
</script>
</body>
</html>
