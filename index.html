<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Stakes Slot Draw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <main class="game-container">
            <h1 class="neon-title">Lucky Draw MEF Scretary Conference 2026</h1>
            
            <div class="machine-frame">
                <div class="slot-display">
                    <div class="reel" id="reel1">?</div>
                    <div class="reel" id="reel2">?</div>
                    <div class="reel" id="reel3">?</div>
                </div>

                <div class="lever-area">
                    <div class="lever-socket">
                        <div class="lever-track"></div>
                        <div class="lever-arm" id="leverArm">
                            <div class="lever-ball" id="leverBall"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <p id="status">PULL THE LEVER TO START</p>
        </main>

        <aside class="winner-sidebar">
            <div class="sidebar-header">WINNERS HISTORY</div>
            <ul id="winnerList">
                </ul>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
