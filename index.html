<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Slot - Pull Lever</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-layout">
        <div class="casino-container">
            <h1 class="title">LUCKY SLOT</h1>
            
            <div class="machine-body">
                <div class="slot-window">
                    <div class="reel" id="reel1"><div class="number">?</div></div>
                    <div class="reel" id="reel2"><div class="number">?</div></div>
                    <div class="reel" id="reel3"><div class="number">?</div></div>
                </div>

                <div class="lever-system">
                    <div class="lever-track"></div>
                    <div class="lever-arm" id="leverArm">
                        <div class="lever-ball" id="leverBall"></div>
                    </div>
                </div>
            </div>

            <h2 id="status">PULL LEVER TO SPIN</h2>
        </div>

        <div class="winners-sidebar">
            <h3>WINNERS LOG</h3>
            <ul id="winnerList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
