<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Slot Lucky Draw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="casino-container">
        <h1 class="title">LUCKY SLOT DRAW</h1>
        
        <div class="slot-machine">
            <div class="slot-window">
                <div class="reel" id="reel1"><div class="number">?</div></div>
                <div class="reel" id="reel2"><div class="number">?</div></div>
                <div class="reel" id="reel3"><div class="number">?</div></div>
            </div>
        </div>

        <div class="controls">
            <button id="drawBtn" onclick="pullLever()">PULL LEVER</button>
            <h2 id="status">PRESS TO SPIN</h2>
        </div>
    </div>

    <div class="winners-sidebar">
        <h3>WINNERS LOG</h3>
        <ul id="winnerList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
